<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Nextline</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: #fff;
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .login-logo span { color: #C8102E; }
    .login-subtitle { font-size: 0.8rem; color: #888; margin-bottom: 36px; letter-spacing: 0.06em; text-transform: uppercase; }
    .login-error { background: #fff0f2; border: 1px solid #C8102E; color: #C8102E; padding: 10px 14px; border-radius: 2px; font-size: 0.82rem; margin-bottom: 16px; display: none; }
    .login-error.visible { display: block; }
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;600&display=swap');
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">NEXT<span>LINE</span></div>
    <div class="login-subtitle">Admin Panel</div>

    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>

    <form id="loginForm">
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter admin password" autofocus />
      </div>
      <button type="submit" class="btn-submit" style="width:100%;justify-content:center;">
        Sign In →
      </button>
    </form>

    <p style="margin-top:20px;font-size:0.72rem;color:#bbb;text-align:center;">
      <a href="../index.html" style="color:#888;">← Back to site</a>
    </p>
  </div>

  <script>
    // Simple password check — change "nextline2025" to your own password
    const ADMIN_PASSWORD = "nextline2025";

    // If already logged in, redirect
    if (sessionStorage.getItem("nl_admin") === "true") {
      location.href = "dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const pw = document.getElementById("password").value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem("nl_admin", "true");
        location.href = "dashboard.html";
      } else {
        document.getElementById("loginError").classList.add("visible");
        document.getElementById("password").classList.add("error");
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
  </script>
</body>
</html>
